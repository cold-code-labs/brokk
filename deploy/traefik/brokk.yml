# Traefik dynamic config (file provider) — no Docker socket, so it works on any
# Docker version. `web` is a single replica; Traefik gates it with an active
# healthcheck and retries transient failures. A deploy recreates `web` in place
# (brief blink while the new container becomes healthy). No blue/green.
http:
  routers:
    brokk:
      rule: "PathPrefix(`/`)"
      entryPoints: ["web"]
      service: brokk
      middlewares: ["brokk-retry"]

  middlewares:
    brokk-retry:
      retry:
        attempts: 3
        initialInterval: "100ms"

  services:
    brokk:
      loadBalancer:
        healthCheck:
          path: /brokk.svg
          interval: "3s"
          timeout: "2s"
        servers:
          - url: "http://web:3000"
