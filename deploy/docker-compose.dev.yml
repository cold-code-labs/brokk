# Surtr DEV-lane override for ../docker-compose.yml.  (run from the repo root:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.dev.yml -p brokk-dev ... )
#
# The permanent dev/preview lane of Brokk's own UI — https://brokk.preview.coldcodelabs.com
# (open shell, no Logto), serving the `dev` branch against the isolated brokk-db-dev.
#
# Mirrors the prod surtr override, but single-replica and Traefik-less: the cloudflared
# tunnel points brokk.preview straight at the web container on host 127.0.0.1:3011.
#
#   api  — HOST networking, drop-in for the old brokk-api-dev systemd unit: binds :8790
#          (BROKK_API_PORT in brokk-dev.env), reaches brokk-db-dev (127.0.0.1:5435),
#          headroom (:8793) and Hauldr control (<hauldr-control-host>:8787) on their host addresses.
#   web  — bridged, publishes 127.0.0.1:3011:3000 (the tunnel target). Reaches the
#          host-net api via host.docker.internal:8790.
#   db   — not bundled; the standalone brokk-db-dev container holds the dev data.
name: brokk-dev

services:
  traefik: !reset null
  db: !reset null
  web-green: !reset null

  api:
    image: brokk-api-dev:local
    network_mode: host
    depends_on: !reset null
    expose: !reset null
    environment: !reset null
    env_file:
      - /home/brokk/brokk-dev.env
    user: "1001:1001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8790/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30

  web-blue:
    image: brokk-web-dev:local
    ports:
      - "127.0.0.1:3011:3000"
    environment:
      BROKK_API_INTERNAL_URL: http://host.docker.internal:8790
    env_file:
      - /home/brokk/brokk-dev.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── dev-lane forge workers (chat + forge) ─────────────────────────────────────
  # Cabled into the dev lane so the Sindri live-preview pipeline runs here too,
  # HARD-ISOLATED from the prod workers:
  #   • chat (Sindri) on :8796 (prod chat is host-net :8795)
  #   • own work volume /home/brokk/work-dev (prod uses /home/brokk/work) — session
  #     checkouts + preview worktrees never collide
  #   • own preview port range 4200-4299 (prod uses 4100-4199)
  # The *.preview public domain is routed by the prod gateway only (singleton), so
  # dev-lane previews are validated on their local 127.0.0.1:<port> dev server.
  chat:
    image: brokk-chat-dev:local
    profiles: !reset null
    network_mode: host
    depends_on: !reset null
    expose: !reset null
    environment: !override
      # !override drops the image's HOME, leaving HOME=/ — then git can't find
      # /home/brokk/.gitconfig (the gh credential helper) and every GitHub clone
      # fails ("could not read Username"), surfacing as a misleading ENOENT.
      HOME: /home/brokk
      SINDRI_PORT: "8796"
      SINDRI_WORKDIR: /home/brokk/work-dev/sindri
      COREPACK_HOME: /home/brokk/work-dev/sindri/.cache/corepack
      XDG_CACHE_HOME: /home/brokk/work-dev/sindri/.cache
      XDG_DATA_HOME: /home/brokk/work-dev/sindri/.local/share
      PNPM_HOME: /home/brokk/work-dev/sindri/.local/share/pnpm
      npm_config_cache: /home/brokk/work-dev/sindri/.cache/npm
      npm_config_store_dir: /home/brokk/work-dev/sindri/.pnpm-store
    env_file:
      - /home/brokk/brokk-dev.env
    user: "1001:1001"
    volumes: !override
      - /home/brokk/work-dev:/home/brokk/work-dev
      - /home/brokk/.config/gh:/home/brokk/.config/gh:ro
      - /home/brokk/.gitconfig:/home/brokk/.gitconfig:ro

  forge:
    image: brokk-forge-dev:local
    profiles: !reset null
    network_mode: host
    depends_on: !reset null
    environment: !override
      # Same as chat: restore HOME so git/gh find the mounted creds when cloning.
      HOME: /home/brokk
      BROKK_CONTROL_URL: http://127.0.0.1:8790
      BROKK_RUNNER_WORKDIR: /home/brokk/work-dev
      BROKK_PREVIEW_PORT_MIN: "4200"
      BROKK_PREVIEW_PORT_MAX: "4299"
      COREPACK_HOME: /home/brokk/work-dev/.cache/corepack
      XDG_CACHE_HOME: /home/brokk/work-dev/.cache
      XDG_DATA_HOME: /home/brokk/work-dev/.local/share
      PNPM_HOME: /home/brokk/work-dev/.local/share/pnpm
      npm_config_cache: /home/brokk/work-dev/.cache/npm
      npm_config_store_dir: /home/brokk/work-dev/.pnpm-store
    env_file:
      - /home/brokk/brokk-dev.env
    user: "1001:1001"
    volumes: !override
      - /home/brokk/work-dev:/home/brokk/work-dev
      - /home/brokk/.config/gh:/home/brokk/.config/gh:ro
      - /home/brokk/.gitconfig:/home/brokk/.gitconfig:ro
