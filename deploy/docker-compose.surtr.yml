# Surtr production override for ../docker-compose.yml.  (run from the repo root:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.surtr.yml ... )
#
# api / runner / eitri / gateway run with HOST networking — drop-in for the old
# systemd units: they read /home/brokk/brokk.env verbatim, reach host-published
# services (Hauldr db :5434, headroom :8793, hauldr control <hauldr-control-host>:8787, api
# localhost:8789) on their existing addresses, and the *.preview lane keeps working
# (gateway + runner share the host loopback exactly as before). They run as uid 1000
# (brokk) so the mode-600 creds (gh config, eitri .pem) are readable and worktree
# files stay brokk-owned (clean rollback to systemd).
#
# web runs bridged behind Traefik (host :3010 — the cloudflared tunnel target) as
# two blue/green replicas for zero-downtime rolling. No bundled Postgres.
name: brokk

services:
  traefik:
    ports: !override
      - "127.0.0.1:${BROKK_HTTP_PORT:-3010}:80"

  db: !reset null

  api:
    network_mode: host
    depends_on: !reset null
    expose: !reset null
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
    user: "1001:1001"

  web-blue:
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.web.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web-green:
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.web.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  forge:
    network_mode: host
    depends_on: !reset null
    # Container runs as uid 1001 with HOME=/home/brokk read-only, so pnpm/corepack's
    # default ~/.cache/node/corepack mkdir EACCESes and preview builds die. Redirect
    # every cache/store to the writable /home/brokk/work volume (mounted below).
    # !override replaces the base env map wholesale (host-net runtime values come
    # from the env_files), exactly like the !reset null it stands in for — plus these.
    environment: !override
      COREPACK_HOME: /home/brokk/work/.cache/corepack
      XDG_CACHE_HOME: /home/brokk/work/.cache
      XDG_DATA_HOME: /home/brokk/work/.local/share
      PNPM_HOME: /home/brokk/work/.local/share/pnpm
      npm_config_cache: /home/brokk/work/.cache/npm
      npm_config_store_dir: /home/brokk/work/.pnpm-store
      # Per-app preview secrets (e.g. the LiteLLM gateway key for image gen) live
      # here as <hauldrProject>.env, OUTSIDE any worktree. The supervisor merges
      # them into each preview's spawn env (see apps/forge/src/preview.ts).
      BROKK_PREVIEW_SECRETS_DIR: /home/brokk/preview-secrets
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.worker.env
    user: "1001:1001"
    volumes: !override
      - /home/brokk/work:/home/brokk/work
      - /home/brokk/preview-secrets:/home/brokk/preview-secrets:ro
      - /home/brokk/.config/gh:/home/brokk/.config/gh:ro
      - /home/brokk/.gitconfig:/home/brokk/.gitconfig:ro

  reviewer:
    network_mode: host
    depends_on: !reset null
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.worker.env
    user: "1001:1001"
    volumes:
      - /home/brokk/eitri-app.pem:/home/brokk/eitri-app.pem:ro

  gateway:
    network_mode: host
    environment: !reset null
    expose: !reset null
    env_file:
      - /home/brokk/brokk.env
    user: "1001:1001"

  chat:
    network_mode: host
    depends_on: !reset null
    expose: !reset null
    # Host-net: reaches the gateway (127.0.0.1:4000) and db_brokk (127.0.0.1:5434)
    # exactly like the runner. Session checkouts live under the shared work volume,
    # in their own sindri/ subtree; caches redirected to the writable volume (HOME
    # is read-only at uid 1001). The agent's bash runs pnpm/git/gh in checkouts.
    environment: !override
      SINDRI_PORT: "8795"
      SINDRI_WORKDIR: /home/brokk/work/sindri
      COREPACK_HOME: /home/brokk/work/sindri/.cache/corepack
      XDG_CACHE_HOME: /home/brokk/work/sindri/.cache
      XDG_DATA_HOME: /home/brokk/work/sindri/.local/share
      PNPM_HOME: /home/brokk/work/sindri/.local/share/pnpm
      npm_config_cache: /home/brokk/work/sindri/.cache/npm
      npm_config_store_dir: /home/brokk/work/sindri/.pnpm-store
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.worker.env
    user: "1001:1001"
    volumes: !override
      - /home/brokk/work:/home/brokk/work
      - /home/brokk/.config/gh:/home/brokk/.config/gh:ro
      - /home/brokk/.gitconfig:/home/brokk/.gitconfig:ro
