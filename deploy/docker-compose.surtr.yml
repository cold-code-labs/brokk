# Surtr production override for ../docker-compose.yml.  (run from the repo root:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.surtr.yml ... )
#
# BRIDGE networking (Phase 1b, 2026-06-26) — no more network_mode: host. Every
# service runs on the brokk compose network and reaches the others by DNS
# (api:8789, chat:8795, and the preview-proxy proxies previews to forge:<port>). Host-
# side deps are reached over Docker networks / the WireGuard IP, NOTHING public:
#   • db_brokk        -> external `coolify` net, hauldr-db-bridge:5434 (socat)
#   • LiteLLM/Ratatoskr -> external `litellm` net (the litellm Coolify app's
#     stable resource-UUID network), litellm:4000
#   • hauldr control / langfuse / dev-api -> the surtr WireGuard IP 10.10.0.2
#     (:8787 / :3015 / :8790) — routable from bridge containers
# Bridge URLs live in /home/brokk/brokk.env (host:port swapped to the above);
# secrets stay there too. Only `web` (Traefik :3010) and `preview-proxy` (:3020, the
# *.preview tunnel target) publish on the host loopback.
#
# uid 1001 (brokk) so mode-600 creds (gh config, eitri .pem) are readable and
# worktree files stay brokk-owned. No bundled Postgres.
name: brokk

networks:
  coolify:
    external: true
  litellm:
    external: true
    name: cbte3k2aufcrd3o664v33y7g

services:
  traefik:
    ports: !override
      - "127.0.0.1:${BROKK_HTTP_PORT:-3010}:80"

  db: !reset null

  api:
    depends_on: !reset null
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
    expose:
      - "8789"
    ports:
      - "127.0.0.1:8789:8789"   # backward-compat: host-loopback access (webhooks/dev gateway)
    networks: [default, coolify, litellm]
    user: "1001:1001"

  web:
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.web.env
    networks: [default]

  forge:
    depends_on: !reset null
    environment: !override
      COREPACK_HOME: /home/brokk/work/.cache/corepack
      XDG_CACHE_HOME: /home/brokk/work/.cache
      XDG_DATA_HOME: /home/brokk/work/.local/share
      PNPM_HOME: /home/brokk/work/.local/share/pnpm
      npm_config_cache: /home/brokk/work/.cache/npm
      npm_config_store_dir: /home/brokk/work/.pnpm-store
      # Per-app preview secrets (<hauldrProject>.env), merged into each preview's
      # spawn env (apps/forge/src/preview.ts).
      BROKK_PREVIEW_SECRETS_DIR: /home/brokk/preview-secrets
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.worker.env
    networks: [default, litellm]
    user: "1001:1001"
    volumes: !override
      - /home/brokk/work:/home/brokk/work
      - /home/brokk/preview-secrets:/home/brokk/preview-secrets:ro
      - /home/brokk/.config/gh:/home/brokk/.config/gh:ro
      - /home/brokk/.gitconfig:/home/brokk/.gitconfig:ro

  reviewer:
    depends_on: !reset null
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.worker.env
    networks: [default, coolify, litellm]
    user: "1001:1001"
    volumes:
      - /home/brokk/eitri-app.pem:/home/brokk/eitri-app.pem:ro

  preview-proxy:
    environment: !reset null
    env_file:
      - /home/brokk/brokk.env
    ports:
      - "127.0.0.1:3020:3020"   # the *.preview cloudflared tunnel target
    networks: [default]
    user: "1001:1001"

  chat:
    depends_on: !reset null
    # Bridge: reaches db (coolify net) + LiteLLM (litellm net) + api/forge by DNS.
    # Session checkouts under the shared work volume; caches redirected to the
    # writable volume (HOME read-only at uid 1001).
    environment: !override
      SINDRI_PORT: "8795"
      SINDRI_WORKDIR: /home/brokk/work/sindri
      COREPACK_HOME: /home/brokk/work/sindri/.cache/corepack
      XDG_CACHE_HOME: /home/brokk/work/sindri/.cache
      XDG_DATA_HOME: /home/brokk/work/sindri/.local/share
      PNPM_HOME: /home/brokk/work/sindri/.local/share/pnpm
      npm_config_cache: /home/brokk/work/sindri/.cache/npm
      npm_config_store_dir: /home/brokk/work/sindri/.pnpm-store
    env_file:
      - /home/brokk/brokk.env
      - /home/brokk/brokk.worker.env
    networks: [default, coolify, litellm]
    user: "1001:1001"
    volumes: !override
      - /home/brokk/work:/home/brokk/work
      - /home/brokk/.config/gh:/home/brokk/.config/gh:ro
      - /home/brokk/.gitconfig:/home/brokk/.gitconfig:ro
