# Brokk — production stack, deployed as a Coolify "Docker Compose" resource on surtr.
#
# Postgres (forge store) + Hono control-plane API + Next 15 kanban board.
# Only `web` is public (brokk.coldcodelabs.com). The API is internal; the browser
# reaches it through same-origin Next rewrites (/api → api:8789).
#
# Runner + Eitri are separate daemons on the worker host (surtr) — not in this stack.
services:
  brokk-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brokk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brokk}
      POSTGRES_DB: brokk
    volumes:
      - brokk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brokk"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      default: {}
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      BROKK_DATABASE_URL: postgres://brokk:${POSTGRES_PASSWORD:-brokk}@brokk-db:5432/brokk
      BROKK_API_PORT: "8789"
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:-}
      BROKK_GITHUB_WEBHOOK_SECRET: ${BROKK_GITHUB_WEBHOOK_SECRET:-}
      MIMIR_MODEL: ${MIMIR_MODEL:-gpt-4.1-mini}
      MIMIR_BASE_URL: ${MIMIR_BASE_URL:-}
      MIMIR_API_KEY: ${MIMIR_API_KEY:-}
    depends_on:
      brokk-db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    expose:
      - "8789"
    networks:
      default: {}
      coolify: {}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    labels:
      - traefik.docker.network=coolify
    environment:
      BROKK_API_INTERNAL_URL: http://api:8789
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
    expose:
      - "3000"
    networks:
      default: {}
      coolify: {}
    restart: unless-stopped

networks:
  coolify:
    external: true

volumes:
  brokk_pgdata:
