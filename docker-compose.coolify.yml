# Brokk — Coolify deployment compose (Phase 2, 2026-06-26).
#
# Brings Brokk under Coolify as the last off-Coolify fleet app. Differences from the
# standalone surtr compose (deploy/docker-compose.surtr.yml), which this replaces:
#
#   • No bundled traefik/db. Ingress is published by the Coolify proxy via Heimdall
#     /routing (heimdall-file routes for brokk.coldcodelabs.com → web:3000 and
#     *.preview.coldcodelabs.com → gateway:3020) — Coolify's label generator fails on
#     multi-service compose, so NO hand-written labels. db is the external db_brokk
#     (hauldr-db-bridge:5434 on the `coolify` net), set via BROKK_DATABASE_URL.
#   • Host coupling removed: the four host bind-mounts under /home/brokk (work, gh
#     config, gitconfig, eitri pem, preview-secrets) collapse into ONE Coolify-managed
#     named volume `brokk_home` mounted at /home/brokk (HOME). Seed it once from the
#     live host (see BROKK-COOLIFY-MIGRATION.md). Portable — no fixed host paths.
#   • Workers still run as uid 1001 (brokk): non-root for the worktree/preview blast
#     radius. HOME=/home/brokk is now a writable volume, so the cache redirects the
#     surtr override needed (read-only HOME) are gone.
#   • node_auth is a build ARG (NODE_AUTH_TOKEN, Coolify is_buildtime) — see the
#     Dockerfiles. Runtime env is interpolated from Coolify-managed vars (${VAR});
#     Coolify does NOT auto-inject, so every var a service needs is referenced here.
#
# Off-container deps (verified reachable from the `coolify` net 2026-06-26):
#   db_brokk → hauldr-db-bridge:5434 · LiteLLM → litellm:4000 (litellm net)
#   hauldr-control/langfuse → WireGuard 10.10.0.2:8787 / :3015
name: brokk

networks:
  default:
  coolify:
    external: true
  litellm:
    external: true
    name: cbte3k2aufcrd3o664v33y7g

volumes:
  brokk_home:

x-restart: &restart
  restart: unless-stopped

# Full runtime env for the worker tier (forge/chat/reviewer). Coolify interpolates
# ${VAR} from its env store; infra-fixed values are inlined as defaults. Extra vars
# on a service are harmless — better that than a missing one.
x-worker-env: &worker-env
  HOME: /home/brokk
  BROKK_CONTROL_URL: ${BROKK_CONTROL_URL:-http://brokk-api:8789}
  BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:?set in Coolify}
  BROKK_RUNNER_WORKDIR: ${BROKK_RUNNER_WORKDIR:-/home/brokk/work}
  BROKK_RUNNER_HOST: ${BROKK_RUNNER_HOST:-surtr}
  BROKK_DATABASE_URL: ${BROKK_DATABASE_URL:?set in Coolify}
  BROKK_SECRETS_KEY: ${BROKK_SECRETS_KEY:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  BROKK_GIT_NAME: ${BROKK_GIT_NAME:-Brokk}
  BROKK_GIT_EMAIL: ${BROKK_GIT_EMAIL:-brokk@coldcodelabs.com}
  BROKK_DEFAULT_REPO: ${BROKK_DEFAULT_REPO:-}
  BROKK_DEFAULT_BRANCH: ${BROKK_DEFAULT_BRANCH:-}
  BROKK_BROWSER: ${BROKK_BROWSER:-}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
  ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
  CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
  ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
  ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
  ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_HOST: ${LANGFUSE_HOST:-}

services:
  brokk-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-api:coolify
    environment:
      BROKK_DATABASE_URL: ${BROKK_DATABASE_URL:?set in Coolify}
      BROKK_API_PORT: "8789"
      BROKK_SECRETS_KEY: ${BROKK_SECRETS_KEY:-}
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:-}
      BROKK_API_SECRET: ${BROKK_API_SECRET:-}
      BROKK_GITHUB_WEBHOOK_SECRET: ${BROKK_GITHUB_WEBHOOK_SECRET:-}
      BROKK_SINDRI_URL: ${BROKK_SINDRI_URL:-http://chat:8795}
      BROKK_DEFAULT_REPO: ${BROKK_DEFAULT_REPO:-}
      BROKK_DEFAULT_BRANCH: ${BROKK_DEFAULT_BRANCH:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      MIMIR_MODEL: ${MIMIR_MODEL:-gpt-4.1-mini}
      MIMIR_BASE_URL: ${MIMIR_BASE_URL:-}
      MIMIR_API_KEY: ${MIMIR_API_KEY:-}
      MIMIR_PROVIDER: ${MIMIR_PROVIDER:-}
      MIMIR_PLANNER_MODEL: ${MIMIR_PLANNER_MODEL:-}
      MIMIR_TRIAGE_MODEL: ${MIMIR_TRIAGE_MODEL:-}
      MIMIR_ENHANCE_MODEL: ${MIMIR_ENHANCE_MODEL:-}
      HAULDR_CONTROL_URL: ${HAULDR_CONTROL_URL:-}
      HAULDR_TOKEN: ${HAULDR_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    expose:
      - "8789"
    # Serviço nomeado `brokk-api` (NÃO `api`): o nome vira o alias único na rede
    # compartilhada `coolify`; `api` cru colidiria com os serviços api da Saga e do
    # Heimdall → DNS round-robin → workers/web batiam na API errada. Os consumidores
    # (BROKK_CONTROL_URL / BROKK_API_INTERNAL_URL) apontam p/ http://brokk-api:8789.
    networks: [default, coolify, litellm]
    <<: *restart

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-web:coolify
    environment:
      BROKK_API_INTERNAL_URL: ${BROKK_API_INTERNAL_URL:-http://brokk-api:8789}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-}
      LOGTO_BASE_URL: ${LOGTO_BASE_URL:-https://brokk.coldcodelabs.com}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/brokk.svg').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3010:3000"   # tunnel's existing brokk.coldcodelabs.com target
    networks: [default]
    <<: *restart

  forge:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-forge:coolify
    user: "1001:1001"
    environment:
      <<: *worker-env
      BROKK_PREVIEW_SECRETS_DIR: ${BROKK_PREVIEW_SECRETS_DIR:-/home/brokk/preview-secrets}
      BROKK_PREVIEW_CMD: ${BROKK_PREVIEW_CMD:-}
      BROKK_PREVIEW_HOST: ${BROKK_PREVIEW_HOST:-forge}
      BROKK_PREVIEW_PINNED: ${BROKK_PREVIEW_PINNED:-}
      BROKK_VERIFY_CMD: ${BROKK_VERIFY_CMD:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    volumes:
      - brokk_home:/home/brokk
    networks: [default, litellm]
    <<: *restart

  reviewer:
    build:
      context: .
      dockerfile: apps/reviewer/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-reviewer:coolify
    user: "1001:1001"
    environment:
      <<: *worker-env
      EITRI_APP_ID: ${EITRI_APP_ID:-}
      EITRI_APP_PRIVATE_KEY_FILE: ${EITRI_APP_PRIVATE_KEY_FILE:-/home/brokk/eitri-app.pem}
      EITRI_PROMOTE: ${EITRI_PROMOTE:-}
      BROKK_DEFAULT_MODEL: ${BROKK_DEFAULT_MODEL:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    volumes:
      - brokk_home:/home/brokk
    networks: [default, coolify, litellm]
    <<: *restart

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-gateway:coolify
    environment:
      BROKK_GATEWAY_PORT: "3020"
      BROKK_CONTROL_URL: ${BROKK_CONTROL_URL:-http://brokk-api:8789}
      BROKK_CONTROL_URL_EXTRA: ${BROKK_CONTROL_URL_EXTRA:-}
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:-}
      BROKK_PREVIEW_HOST: ${BROKK_PREVIEW_HOST:-forge}
      # The singleton gateway also serves the dev-lane plane (BROKK_CONTROL_URL_EXTRA,
      # the host-networked runner on WG 10.10.0.2): its previews bind the HOST, not the
      # `forge` container. Map that plane's previews to the host so they don't 502.
      BROKK_PREVIEW_HOST_MAP: ${BROKK_PREVIEW_HOST_MAP:-}
    expose:
      - "3020"
    ports:
      - "127.0.0.1:3020:3020"   # tunnel's existing *.preview.coldcodelabs.com target
    networks: [default, coolify]   # coolify net = reachability to the dev control plane (WG 10.10.0.2:8790)
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets BROKK_PREVIEW_HOST_MAP target the host
    <<: *restart

  chat:
    build:
      context: .
      dockerfile: apps/chat/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-chat:coolify
    user: "1001:1001"
    environment:
      <<: *worker-env
      SINDRI_PORT: "8795"
      SINDRI_WORKDIR: ${SINDRI_WORKDIR:-/home/brokk/work/sindri}
      BROKK_EMBED_BASE_URL: ${BROKK_EMBED_BASE_URL:-}
      BROKK_EMBED_API_KEY: ${BROKK_EMBED_API_KEY:-}
      BROKK_EMBED_MODEL: ${BROKK_EMBED_MODEL:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    volumes:
      - brokk_home:/home/brokk
    expose:
      - "8795"
    networks: [default, coolify, litellm]
    <<: *restart
