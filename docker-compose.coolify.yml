# Brokk — Coolify deployment compose (Phase 2, 2026-06-26).
#
# Brings Brokk under Coolify as the last off-Coolify fleet app. Differences from the
# standalone surtr compose (deploy/docker-compose.surtr.yml), which this replaces:
#
#   • No bundled traefik/db. Ingress is published by the Coolify proxy via Heimdall
#     /routing (heimdall-file routes for brokk.coldcodelabs.com → web:3000 and
#     *.preview.coldcodelabs.com → preview-proxy:3020) — Coolify's label generator fails on
#     multi-service compose, so NO hand-written labels. db is the external db_brokk
#     (hauldr-db-bridge:5434 on the `coolify` net), set via BROKK_DATABASE_URL.
#   • Host coupling removed: the four host bind-mounts under /home/brokk (work, gh
#     config, gitconfig, eitri pem, preview-secrets) collapse into ONE Coolify-managed
#     named volume `brokk_home` mounted at /home/brokk (HOME). Seed it once from the
#     live host (see BROKK-COOLIFY-MIGRATION.md). Portable — no fixed host paths.
#   • Workers still run as uid 1001 (brokk): non-root for the worktree/preview blast
#     radius. HOME=/home/brokk is now a writable volume, so the cache redirects the
#     surtr override needed (read-only HOME) are gone.
#   • node_auth is a build ARG (NODE_AUTH_TOKEN, Coolify is_buildtime) — see the
#     Dockerfiles. Runtime env is interpolated from Coolify-managed vars (${VAR});
#     Coolify does NOT auto-inject, so every var a service needs is referenced here.
#
# Off-container deps (verified reachable from the `coolify` net 2026-06-26):
#   db_brokk → hauldr-db-bridge:5434 · LiteLLM → litellm:4000 (litellm net)
#   hauldr-control/langfuse → WireGuard 10.10.0.2:8787 / :3015
name: brokk

networks:
  default:
  coolify:
    external: true
  litellm:
    external: true
    name: cbte3k2aufcrd3o664v33y7g

volumes:
  brokk_home:

x-restart: &restart
  restart: unless-stopped

# Resource ceilings (fleet-deploy-isolation, 2026-07-11; tightened 2026-07-21):
# caps, not reservations — a runaway service gets contained instead of squeezing
# the shared surtr host (founding incident: swap exhaustion killed a deploy exec;
# 2026-07-20: BROKK_AUTO overnight + sum of caps ≈10.5 vCPU on an 8-vCPU box →
# Hostinger throttle). Keep the Brokk stack under ~6 vCPU so the rest of the
# fleet still breathes when forge is busy.

# Full runtime env for the worker tier (forge/chat/reviewer). Coolify interpolates
# ${VAR} from its env store; infra-fixed values are inlined as defaults. Extra vars
# on a service are harmless — better that than a missing one.
x-worker-env: &worker-env
  HOME: /home/brokk
  # Fresh preview installs (new app, ADR 0038) run as a dropped uid; the image's
  # default pnpm store (/pnpm) is root-owned → EPERM chmod'ing hardlinked bins.
  # Point store + caches at the 1001-owned work volume.
  COREPACK_HOME: /home/brokk/work/.cache/corepack
  XDG_CACHE_HOME: /home/brokk/work/.cache
  XDG_DATA_HOME: /home/brokk/work/.local
  npm_config_cache: /home/brokk/work/.cache/npm
  npm_config_store_dir: /home/brokk/work/.pnpm-store
  BROKK_CONTROL_URL: ${BROKK_CONTROL_URL:-http://brokk-api:8789}
  BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:?set in Coolify}
  BROKK_RUNNER_WORKDIR: ${BROKK_RUNNER_WORKDIR:-/home/brokk/work}
  BROKK_RUNNER_HOST: ${BROKK_RUNNER_HOST:-surtr}
  BROKK_DATABASE_URL: ${BROKK_DATABASE_URL:?set in Coolify}
  BROKK_SECRETS_KEY: ${BROKK_SECRETS_KEY:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  BROKK_GIT_NAME: ${BROKK_GIT_NAME:-Brokk}
  BROKK_GIT_EMAIL: ${BROKK_GIT_EMAIL:-brokk@coldcodelabs.com}
  BROKK_DEFAULT_REPO: ${BROKK_DEFAULT_REPO:-}
  BROKK_DEFAULT_BRANCH: ${BROKK_DEFAULT_BRANCH:-}
  BROKK_BROWSER: ${BROKK_BROWSER:-}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
  ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
  CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
  ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
  ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
  ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
  # Cursor seat (Ratatoskr sidecar :8791). Cursor API engine in Sindri.
  CURSOR_SEAT_URL: ${CURSOR_SEAT_URL:-}
  CURSOR_SEAT_INGRESS: ${CURSOR_SEAT_INGRESS:-}
  CURSOR_API_KEY: ${CURSOR_API_KEY:-}
  CURSOR_AUTH_TOKEN: ${CURSOR_AUTH_TOKEN:-}
  CURSOR_AGENT_BIN: ${CURSOR_AGENT_BIN:-}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_HOST: ${LANGFUSE_HOST:-}
  # N4 execution enclave (ADR 0010). Default OFF: workers use LocalEnclave (N1-N3),
  # prod behaviour unchanged. Flip = set BROKK_ENCLAVE_BACKEND=runsc in Coolify (the
  # manager + token must be live first). The worker never holds the Docker socket —
  # it drives the enclave-manager sidecar over this token-gated URL.
  BROKK_ENCLAVE_BACKEND: ${BROKK_ENCLAVE_BACKEND:-local}
  BROKK_ENCLAVE_MANAGER_URL: ${BROKK_ENCLAVE_MANAGER_URL:-http://enclave-manager:8795}
  BROKK_ENCLAVE_MANAGER_TOKEN: ${BROKK_ENCLAVE_MANAGER_TOKEN:-}
  # Sindri's scoped bridge to Heimdall's Agent API (set_env/redeploy/route/job).
  # Unset → the infra tools feature-flag themselves off ("not available").
  HEIMDALL_AGENT_URL: ${HEIMDALL_AGENT_URL:-}
  HEIMDALL_AGENT_TOKEN: ${HEIMDALL_AGENT_TOKEN:-}
  # A dev lane's backend now comes from Heimdall (scoped: <app>_dev of a
  # registered app), not from HAULDR_TOKEN — the data plane's MANAGEMENT key,
  # which read the superuser DSN of every project on the fleet.
  # HAULDR_CONTROL_URL stays: it is a URL, not a credential — the preview needs
  # it to apply its OWN migrations with its per-project migrate token.
  HAULDR_CONTROL_URL: ${HAULDR_CONTROL_URL:-}
  # MCP tool servers (Hauldr/Heimdall etc). Coolify does not auto-inject
  # worker env into the container beyond what is listed here — a server
  # config that relies on this var being implicitly present goes silently
  # dead (401 / tool morta).
  BROKK_MCP_SERVERS: ${BROKK_MCP_SERVERS:-}

services:
  brokk-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-api:coolify
    mem_limit: 1g
    cpus: 0.5
    environment:
      BROKK_DATABASE_URL: ${BROKK_DATABASE_URL:?set in Coolify}
      BROKK_API_PORT: "8789"
      BROKK_SECRETS_KEY: ${BROKK_SECRETS_KEY:-}
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:-}
      BROKK_API_SECRET: ${BROKK_API_SECRET:-}
      BROKK_GITHUB_WEBHOOK_SECRET: ${BROKK_GITHUB_WEBHOOK_SECRET:-}
      BROKK_SINDRI_URL: ${BROKK_SINDRI_URL:-http://chat:8795}
      BROKK_DEFAULT_REPO: ${BROKK_DEFAULT_REPO:-}
      BROKK_DEFAULT_BRANCH: ${BROKK_DEFAULT_BRANCH:-}
      # BROKK-44: overnight Regin intake of orphaned failed cards. "1" = on.
      # Pair with BROKK_AUTO_MAX_LIVE (default 1) + auto pause on Mímir 429.
      BROKK_AUTO: ${BROKK_AUTO:-0}
      BROKK_AUTO_MAX_LIVE: ${BROKK_AUTO_MAX_LIVE:-1}
      BROKK_AUTO_PAUSE_MS: ${BROKK_AUTO_PAUSE_MS:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      MIMIR_MODEL: ${MIMIR_MODEL:-gpt-4.1-mini}
      MIMIR_BASE_URL: ${MIMIR_BASE_URL:-}
      MIMIR_API_KEY: ${MIMIR_API_KEY:-}
      MIMIR_PROVIDER: ${MIMIR_PROVIDER:-}
      MIMIR_PLANNER_MODEL: ${MIMIR_PLANNER_MODEL:-}
      MIMIR_TRIAGE_MODEL: ${MIMIR_TRIAGE_MODEL:-}
      MIMIR_ENHANCE_MODEL: ${MIMIR_ENHANCE_MODEL:-}

      # ADR 0038: Nova Conversa calls the Heimdall provisioning engine over the
      # shared `coolify` net. heimdall-api is on that net (alias = service name).
      # Heimdall's SCOPED Agent API (/api/agent/*), which lives on its WEB app.
      # Was HEIMDALL_API_URL + HEIMDALL_TOKEN = the control plane with its
      # INTERNAL token: fleet-wide authority, Ice Vault included, just to create
      # an app. Internal name, not the public URL — Publish waits on cold prod
      # Hauldr (~300s) and Cloudflare would cut it at ~100s.
      HEIMDALL_AGENT_URL: ${HEIMDALL_AGENT_URL:-http://heimdall-web:3000}
      HEIMDALL_AGENT_TOKEN: ${HEIMDALL_AGENT_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    expose:
      - "8789"
    # Serviço nomeado `brokk-api` (NÃO `api`): o nome vira o alias único na rede
    # compartilhada `coolify`; `api` cru colidiria com os serviços api da Saga e do
    # Heimdall → DNS round-robin → workers/web batiam na API errada. Os consumidores
    # (BROKK_CONTROL_URL / BROKK_API_INTERNAL_URL) apontam p/ http://brokk-api:8789.
    networks: [default, coolify, litellm]
    <<: *restart

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-web:coolify
    mem_limit: 1g
    cpus: 0.5
    environment:
      BROKK_API_INTERNAL_URL: ${BROKK_API_INTERNAL_URL:-http://brokk-api:8789}
      # The proxy (apps/web/app/api/[...path]) injects this bearer server-side so
      # mutating UI calls reach the API authorized. Without it here the API's own
      # secret guard 401s every write — the defense-in-depth is inert. Must match
      # the value on the brokk-api service above.
      BROKK_API_SECRET: ${BROKK_API_SECRET:-}
      # Bearer p/ clientes nativos (Brokk Mobile) — alternativa ao cookie Logto
      # nas mutações do proxy. Vazio = caminho desligado.
      BROKK_MOBILE_TOKEN: ${BROKK_MOBILE_TOKEN:-}
      # Mints preview access keys at /preview-gate/<sub> (session-gated). Must
      # equal BROKK_PREVIEW_KEY on the preview-proxy, which verifies them.
      BROKK_PREVIEW_KEY: ${BROKK_PREVIEW_KEY:-}
      BROKK_PREVIEW_DOMAIN: ${BROKK_PREVIEW_DOMAIN:-preview.coldcodelabs.com}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-}
      LOGTO_BASE_URL: ${LOGTO_BASE_URL:-https://brokk.coldcodelabs.com}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/brokk.svg').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3010:3000"   # tunnel's existing brokk.coldcodelabs.com target
    networks: [default]
    <<: *restart

  forge:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-forge:coolify
    mem_limit: 4g
    cpus: 2.0
    # No `user:` — the entrypoint starts as root to install the Nível 3 egress jail
    # (needs CAP_NET_ADMIN) then drops to 1001:1001 before exec. cap dropped with it.
    cap_add: [NET_ADMIN]
    environment:
      <<: *worker-env
      BROKK_EGRESS: "1"
      BROKK_PREVIEW_SECRETS_DIR: ${BROKK_PREVIEW_SECRETS_DIR:-/home/brokk/preview-secrets}
      BROKK_PREVIEW_CMD: ${BROKK_PREVIEW_CMD:-}
      BROKK_PREVIEW_HOST: ${BROKK_PREVIEW_HOST:-forge}
      BROKK_VERIFY_CMD: ${BROKK_VERIFY_CMD:-}
      # Engine lane: afl (native loop, default) | cli (Claude Code CLI, opt-in).
      BROKK_FORGE_ENGINE: ${BROKK_FORGE_ENGINE:-afl}
      # ADR 0017 Fase 3b: apps whose implement cards commit straight to dev (pilot).
      BROKK_DEVLANE_APPS: ${BROKK_DEVLANE_APPS:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    volumes:
      - brokk_home:/home/brokk
    networks:
      default:
        aliases:
      # `*.localhost` é o que o guard de cross-origin do dev do Next allowlista de
      # fábrica. Com este alias o agente de QA do chat dirige o preview em
      # http://forge.localhost:<porta> e o websocket de HMR é aceito — sem que
      # cada app precise declarar allowedDevOrigins. Uma linha de topologia em
      # vez de 19 edições de next.config (BROKK-20/21).
        - forge.localhost
      litellm: {}
    <<: *restart

  # Second forge runner (Regin fan-out, ADR 0027 §5.4): same image/env as `forge`
  # but claim-loop ONLY — BROKK_SUPERVISOR=0 so exactly one runner (forge) owns the
  # preview supervisor while both drain the card queue in parallel. Same build
  # block + image tag on purpose: Docker dedupes the build, Coolify keeps both
  # services deployable.
  forge-b:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-forge:coolify
    mem_limit: 2g
    cpus: 1.0
    # No `user:` — the entrypoint starts as root to install the Nível 3 egress jail
    # (needs CAP_NET_ADMIN) then drops to 1001:1001 before exec. cap dropped with it.
    cap_add: [NET_ADMIN]
    environment:
      <<: *worker-env
      BROKK_EGRESS: "1"
      BROKK_SUPERVISOR: "0"
      BROKK_PREVIEW_SECRETS_DIR: ${BROKK_PREVIEW_SECRETS_DIR:-/home/brokk/preview-secrets}
      BROKK_PREVIEW_CMD: ${BROKK_PREVIEW_CMD:-}
      BROKK_PREVIEW_HOST: ${BROKK_PREVIEW_HOST:-forge}
      BROKK_VERIFY_CMD: ${BROKK_VERIFY_CMD:-}
      # Engine lane: afl (native loop, default) | cli (Claude Code CLI, opt-in).
      BROKK_FORGE_ENGINE: ${BROKK_FORGE_ENGINE:-afl}
      # ADR 0017 Fase 3b: apps whose implement cards commit straight to dev (pilot).
      BROKK_DEVLANE_APPS: ${BROKK_DEVLANE_APPS:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    volumes:
      - brokk_home:/home/brokk
    networks: [default, litellm]
    <<: *restart

  reviewer:
    build:
      context: .
      dockerfile: apps/reviewer/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-reviewer:coolify
    mem_limit: 1.5g
    cpus: 1.0
    # No `user:` — entrypoint boots as root for the egress jail, then drops to 1001.
    cap_add: [NET_ADMIN]
    environment:
      <<: *worker-env
      BROKK_EGRESS: "1"
      EITRI_APP_ID: ${EITRI_APP_ID:-}
      EITRI_APP_PRIVATE_KEY_FILE: ${EITRI_APP_PRIVATE_KEY_FILE:-/home/brokk/eitri-app.pem}
      EITRI_PROMOTE: ${EITRI_PROMOTE:-}
      BROKK_DEFAULT_MODEL: ${BROKK_DEFAULT_MODEL:-}
    depends_on:
      brokk-api:
        condition: service_healthy
    volumes:
      - brokk_home:/home/brokk
    networks: [default, coolify, litellm]
    <<: *restart

  # The N4 execution-enclave broker (ADR 0010 Fase 1). The ONLY component with the
  # Docker socket — it spawns/drives per-project gVisor (runsc) enclaves so the
  # workers never touch the socket. Reachable only on the app-private `default` net
  # (no coolify alias → no cross-app collision), token-gated. Inert until a worker
  # calls it (i.e. until BROKK_ENCLAVE_BACKEND=runsc). Needs the host runsc runtime
  # (Midgard `runsc` role) + BROKK_ENCLAVE_HOME_VOLUME = the real (Coolify-sanitised)
  # brokk_home volume name, so it can mount each checkout's subpath into the enclave.
  enclave-manager:
    build:
      context: .
      dockerfile: apps/enclave-manager/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-enclave-manager:coolify
    mem_limit: 512m
    cpus: 0.5
    environment:
      BROKK_ENCLAVE_MANAGER_TOKEN: ${BROKK_ENCLAVE_MANAGER_TOKEN:?set in Coolify}
      BROKK_ENCLAVE_HOME_VOLUME: ${BROKK_ENCLAVE_HOME_VOLUME:-}
      BROKK_ENCLAVE_HOME_MOUNT: /home/brokk
      BROKK_ENCLAVE_IMAGE: ${BROKK_ENCLAVE_IMAGE:-node:20}
      BROKK_ENCLAVE_DNS: ${BROKK_ENCLAVE_DNS:-1.1.1.1,8.8.8.8}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - brokk_home:/home/brokk
    networks: [default]
    <<: *restart

  preview-proxy:
    build:
      context: .
      dockerfile: apps/preview-proxy/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-preview-proxy:coolify
    mem_limit: 512m
    cpus: 0.5
    environment:
      BROKK_GATEWAY_PORT: "3020"
      BROKK_CONTROL_URL: ${BROKK_CONTROL_URL:-http://brokk-api:8789}
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:-}
      BROKK_PREVIEW_HOST: ${BROKK_PREVIEW_HOST:-forge}
      # Access gate. Must equal BROKK_PREVIEW_KEY on the web, which mints the
      # keys this verifies. UNSET = every request 403s (closed, on purpose).
      BROKK_PREVIEW_KEY: ${BROKK_PREVIEW_KEY:-}
    expose:
      - "3020"
    ports:
      - "127.0.0.1:3020:3020"   # tunnel's existing *.preview.coldcodelabs.com target
    networks: [default]
    <<: *restart

  chat:
    build:
      context: .
      dockerfile: apps/chat/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    image: brokk-chat:coolify
    mem_limit: 2g
    cpus: 1.0
    # No `user:` — entrypoint boots as root for the egress jail, then drops to 1001.
    cap_add: [NET_ADMIN]
    environment:
      <<: *worker-env
      BROKK_EGRESS: "1"
      SINDRI_PORT: "8795"
      SINDRI_WORKDIR: ${SINDRI_WORKDIR:-/home/brokk/work/sindri}
      BROKK_EMBED_BASE_URL: ${BROKK_EMBED_BASE_URL:-}
      BROKK_EMBED_API_KEY: ${BROKK_EMBED_API_KEY:-}
      BROKK_EMBED_MODEL: ${BROKK_EMBED_MODEL:-}
      # Cross-session cap on concurrent CLI-lane turns (engine=cli sessions).
      BROKK_CLI_MAX_CONCURRENT: ${BROKK_CLI_MAX_CONCURRENT:-2}
      BROKK_SKILLS_DIR: ${BROKK_SKILLS_DIR:-/app/skills}
    depends_on:
      brokk-api:
        condition: service_healthy
    volumes:
      - brokk_home:/home/brokk
    expose:
      - "8795"
    networks: [default, coolify, litellm]
    <<: *restart
