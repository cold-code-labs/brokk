# Brokk — canonical self-host stack.
#
#   docker compose up -d                  # the board: Postgres + API + Next web (2 replicas), behind Traefik
#   docker compose --profile forge up -d  # + the forge workers (runner, eitri, gateway)
#
# Public entrypoint is Traefik on ${BROKK_HTTP_PORT:-80}; only `web` is routed.
# The browser reaches the API through same-origin Next rewrites (/api → api:8789).
#
# Zero-downtime deploys: `web` runs as two always-on replicas (web-blue/web-green).
# Traefik (file provider — no Docker socket, so it works on any Docker version)
# load-balances across them with a healthcheck + retry. A release recreates one
# replica at a time; the other keeps serving. See scripts/rolling-deploy.sh.
name: brokk

x-restart: &restart
  restart: unless-stopped

services:
  traefik:
    image: traefik:v3.5
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - "${BROKK_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/traefik:/etc/traefik/dynamic:ro
    <<: *restart

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brokk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brokk}
      POSTGRES_DB: brokk
    volumes:
      - brokk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brokk"]
      interval: 5s
      timeout: 5s
      retries: 20
    <<: *restart

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: brokk-api:local
    environment:
      BROKK_DATABASE_URL: ${BROKK_DATABASE_URL:-postgres://brokk:brokk@db:5432/brokk}
      BROKK_API_PORT: "8789"
      BROKK_SECRETS_KEY: ${BROKK_SECRETS_KEY:-}
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:-}
      BROKK_GITHUB_WEBHOOK_SECRET: ${BROKK_GITHUB_WEBHOOK_SECRET:-}
      MIMIR_MODEL: ${MIMIR_MODEL:-gpt-4.1-mini}
      MIMIR_BASE_URL: ${MIMIR_BASE_URL:-}
      MIMIR_API_KEY: ${MIMIR_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    expose:
      - "8789"
    <<: *restart

  # web — two always-on replicas behind Traefik (blue/green). Both run the same
  # image (brokk-web:local), built once on web-blue. rolling-deploy.sh recreates
  # them one at a time for zero-downtime releases.
  web-blue: &web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: brokk-web:local
    environment:
      BROKK_API_INTERNAL_URL: http://api:8789
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-}
      LOGTO_BASE_URL: ${LOGTO_BASE_URL:-}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/brokk.svg').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    <<: *restart

  web-green:
    # Same image/config as web-blue (no build — shares brokk-web:local).
    image: brokk-web:local
    environment:
      BROKK_API_INTERNAL_URL: http://api:8789
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-}
      LOGTO_BASE_URL: ${LOGTO_BASE_URL:-}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/brokk.svg').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
    <<: *restart

  # ── forge workers (opt-in: --profile forge) ───────────────────────────────────
  runner:
    build:
      context: .
      dockerfile: packages/runner/Dockerfile
    image: brokk-runner:local
    profiles: ["forge"]
    environment:
      BROKK_CONTROL_URL: http://api:8789
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:?set BROKK_RUNNER_SECRET to run the forge}
      BROKK_RUNNER_WORKDIR: /work
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      BROKK_GIT_NAME: ${BROKK_GIT_NAME:-Brokk}
      BROKK_GIT_EMAIL: ${BROKK_GIT_EMAIL:-brokk@localhost}
    volumes:
      - brokk_work:/work
      # DoD — uncomment (and add `docker-cli` to the runner image) to let the agent
      # build/run target repos as sibling containers via the host Docker daemon.
      # Root-equivalent on the host: single-tenant self-host only.
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      api:
        condition: service_healthy
    <<: *restart

  eitri:
    build:
      context: .
      dockerfile: packages/eitri/Dockerfile
    image: brokk-eitri:local
    profiles: ["forge"]
    environment:
      BROKK_DATABASE_URL: ${BROKK_DATABASE_URL:-postgres://brokk:brokk@db:5432/brokk}
      EITRI_GITHUB_TOKEN: ${EITRI_GITHUB_TOKEN:-}
      EITRI_MODEL: ${EITRI_MODEL:-}
      BROKK_DEFAULT_MODEL: ${BROKK_DEFAULT_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    <<: *restart

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    image: brokk-gateway:local
    profiles: ["forge"]
    environment:
      BROKK_GATEWAY_PORT: "3020"
      BROKK_CONTROL_URL: http://api:8789
      BROKK_RUNNER_SECRET: ${BROKK_RUNNER_SECRET:-}
    expose:
      - "3020"
    <<: *restart

volumes:
  brokk_pgdata:
  brokk_work:
