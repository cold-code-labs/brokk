name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        env:
          # auth to GitHub Packages for private @cold-code-labs/* deps
          # (yggdrasil) — same token Coolify uses at build time.
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: pnpm typecheck
      - run: pnpm build
